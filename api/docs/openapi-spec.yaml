          type: string
          format: uuid
          title: Evaluation Id
        status:
          $ref: '#/components/schemas/EvaluationStatus'
        overall_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Overall Score
        daat_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Daat Score
        dai_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Dai Score
        mla_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Mla Score
        ndcg_10:
          anyOf:
          - type: number
          - type: 'null'
          title: Ndcg 10
        map_100:
          anyOf:
          - type: number
          - type: 'null'
          title: Map 100
        mrr_10:
          anyOf:
          - type: number
          - type: 'null'
          title: Mrr 10
        recall_100:
          anyOf:
          - type: number
          - type: 'null'
          title: Recall 100
        precision_10:
          anyOf:
          - type: number
          - type: 'null'
          title: Precision 10
        tier1_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Tier1 Score
        tier2_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Tier2 Score
        tier3_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Tier3 Score
        tier4_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Tier4 Score
        tier5_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Tier5 Score
        metrics:
          additionalProperties: true
          type: object
          title: Metrics
        langsmith_run_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Langsmith Run Id
        trace_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Trace Url
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - evaluation_id
      - status
      - overall_score
      - daat_score
      - dai_score
      - mla_score
      - ndcg_10
      - map_100
      - mrr_10
      - recall_100
      - precision_10
      - tier1_score
      - tier2_score
      - tier3_score
      - tier4_score
      - tier5_score
      - langsmith_run_id
      - trace_url
