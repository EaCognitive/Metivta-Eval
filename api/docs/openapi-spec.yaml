        name:
          type: string
          maxLength: 255
          minLength: 1
          title: Name
        scopes:
          items:
            type: string
          type: array
          title: Scopes
          default:
          - eval:read
          - eval:write
        expires_in_days:
          anyOf:
          - type: integer
            maximum: 365.0
            minimum: 1.0
          - type: 'null'
          title: Expires In Days
      type: object
      required:
      - name
      title: APIKeyCreate
      description: API key create request model.
    APIKeyCreatedResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        name:
          type: string
          title: Name
        key:
          type: string
          title: Key
        key_prefix:
          type: string
          title: Key Prefix
        scopes:
          items:
            type: string
          type: array
          title: Scopes
        created_at:
          type: string
          format: date-time
          title: Created At
        expires_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Expires At
        message:
          type: string
          title: Message
          default: Save this key securely - it will not be shown again!
      type: object
      required:
      - id
      - name
      - key
      - key_prefix
      - scopes
      - created_at
      - expires_at
      title: APIKeyCreatedResponse
      description: Response returned when a key is created.
    APIKeyResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        name:
          type: string
          title: Name
        key_prefix:
          type: string
          title: Key Prefix
        scopes:
          items:
            type: string
          type: array
          title: Scopes
        created_at:
          type: string
          format: date-time
          title: Created At
        expires_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Expires At
        last_used_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Used At
      type: object
      required:
      - id
      - name
      - key_prefix
      - scopes
      - created_at
      - expires_at
      - last_used_at
      title: APIKeyResponse
      description: API key metadata response model.
    EvaluationCreate:
      properties:
        system_name:
          type: string
          maxLength: 255
          minLength: 1
          title: System Name
        system_version:
          anyOf:
          - type: string
            maxLength: 50
          - type: 'null'
          title: System Version
        endpoint_url:
          type: string
          maxLength: 2083
          minLength: 1
          format: uri
          title: Endpoint Url
        mode:
          $ref: '#/components/schemas/EvaluationMode'
          default: daat
        dataset_name:
          type: string
          title: Dataset Name
          default: default
        config:
          additionalProperties: true
          type: object
          title: Config
        async_mode:
          type: boolean
          title: Async Mode
          description: Run evaluation asynchronously
          default: true
      type: object
      required:
      - system_name
      - endpoint_url
      title: EvaluationCreate
      description: Evaluation submission request.
    EvaluationListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/EvaluationResponse'
          type: array
          title: Items
        total:
          type: integer
          title: Total
        page:
          type: integer
          title: Page
        page_size:
          type: integer
          title: Page Size
      type: object
      required:
      - items
      - total
      - page
      - page_size
      title: EvaluationListResponse
      description: List of evaluations response.
    EvaluationMode:
      type: string
      enum:
      - daat
      - mteb
      title: EvaluationMode
      description: Evaluation mode.
    EvaluationResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        system_name:
          type: string
          title: System Name
        system_version:
          anyOf:
          - type: string
          - type: 'null'
          title: System Version
        endpoint_url:
          type: string
          title: Endpoint Url
        mode:
          $ref: '#/components/schemas/EvaluationMode'
        dataset_name:
          type: string
          title: Dataset Name
        status:
          $ref: '#/components/schemas/EvaluationStatus'
        progress:
          type: integer
          maximum: 100.0
          minimum: 0.0
          title: Progress
        created_at:
          type: string
          format: date-time
          title: Created At
        started_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Started At
        completed_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Completed At
        error_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Message
      type: object
      required:
      - id
      - system_name
      - system_version
      - endpoint_url
      - mode
      - dataset_name
      - status
      - progress
      - created_at
      - started_at
      - completed_at
      title: EvaluationResponse
      description: Evaluation response.
    EvaluationResultsResponse:
      properties:
