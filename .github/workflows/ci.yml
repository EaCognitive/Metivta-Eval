name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  GO_VERSION: '1.25'
  PYTHON_VERSION: '3.12'

jobs:
  go:
    name: Go Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go test (race)
        run: go test -race ./...

      - name: Go lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

      - name: Go build
        run: |
          go build -o bin/metivta ./cmd/metivta
          go build -o bin/metivta-gateway ./cmd/metivta-gateway

  python:
    name: Python Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --dev
          uv pip install -e .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Pylint
        run: PYTHONPATH=src:. uv run pylint api src tests

      - name: Mypy
        run: uv run mypy src/

      - name: Pytest
        run: uv run pytest -q --cov=src --cov-report=xml

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            aquasec/trivy:0.63.0 \
            fs \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 0 \
            /workspace

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Matrix
    runs-on: ubuntu-latest
    needs: [go, python, security]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build CLI binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/metivta-linux-amd64 ./cmd/metivta
          GOOS=linux GOARCH=arm64 go build -o bin/metivta-linux-arm64 ./cmd/metivta
          GOOS=darwin GOARCH=arm64 go build -o bin/metivta-darwin-arm64 ./cmd/metivta
          GOOS=linux GOARCH=amd64 go build -o bin/metivta-gateway-linux-amd64 ./cmd/metivta-gateway

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metivta-binaries
          path: bin/*
