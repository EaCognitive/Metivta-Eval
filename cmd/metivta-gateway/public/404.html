<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404: Not Found | Metivta Evaluation Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      color-scheme: dark;
      --bg-main: #000000;
      --bg-subtle: #0a0a0a;
      --bg-hover: #1a1a1a;
      --border-color: #222222;
      --border-hover: #333333;
      --text-main: #ededed;
      --text-muted: #888888;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.15);
      --focus-ring: rgba(16, 185, 129, 0.4);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: radial-gradient(circle at 50% 0%, var(--bg-subtle) 0%, var(--bg-main) 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
      transition: all 0.15s ease;
    }

    a:focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      color: var(--text-main);
    }

    p {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text-muted);
    }

    .status-code {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 9999px;
      background: var(--bg-hover);
      border: 1px solid var(--border-color);
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      height: 40px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      background: var(--text-main);
      color: var(--bg-main);
      margin-top: 16px;
    }

    .btn:hover {
      background: #ffffff;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you are looking for does not exist.</p>
    <a href="/" class="btn">Return to Home</a>
  </div>
</body>
</html>
