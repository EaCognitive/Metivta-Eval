# Prometheus Alert Rules for MetivitaEval

groups:
  # Service Health Alerts
  - name: service_health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job=~".*metivta.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(metivta_http_requests_total{status=~"5.."}[5m])) by (service)
          /
          sum(rate(metivta_http_requests_total[5m])) by (service)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Service {{ $labels.service }} has error rate of {{ $value | humanizePercentage }}."

      - alert: CriticalErrorRate
        expr: |
          sum(rate(metivta_http_requests_total{status=~"5.."}[5m])) by (service)
          /
          sum(rate(metivta_http_requests_total[5m])) by (service)
          > 0.10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate on {{ $labels.service }}"
          description: "Service {{ $labels.service }} has error rate of {{ $value | humanizePercentage }}."

  # Latency Alerts
  - name: latency
    interval: 30s
    rules:
      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95, sum(rate(metivta_http_request_duration_seconds_bucket[5m])) by (le, service))
          > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency on {{ $labels.service }}"
          description: "P95 latency is {{ $value | humanizeDuration }} on {{ $labels.service }}."

      - alert: CriticalLatencyP99
        expr: |
          histogram_quantile(0.99, sum(rate(metivta_http_request_duration_seconds_bucket[5m])) by (le, service))
          > 2.0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical P99 latency on {{ $labels.service }}"
          description: "P99 latency is {{ $value | humanizeDuration }} on {{ $labels.service }}."

  # Evaluation Alerts
  - name: evaluations
    interval: 1m
    rules:
      - alert: EvaluationFailed
        expr: increase(metivta_evaluations_total{status="failed"}[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Evaluation failed"
          description: "{{ $value }} evaluations failed in the last 5 minutes."

      - alert: EvaluationStuck
        expr: |
          metivta_evaluations_active > 0
          and
          changes(metivta_evaluation_progress[30m]) == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Evaluation appears stuck"
          description: "Active evaluation has not made progress in 30 minutes."

      - alert: HighEvaluationDuration
        expr: |
          histogram_quantile(0.95, sum(rate(metivta_evaluation_duration_seconds_bucket[1h])) by (le, mode))
          > 3600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Long evaluation duration for {{ $labels.mode }}"
          description: "P95 evaluation duration is {{ $value | humanizeDuration }} for mode {{ $labels.mode }}."

  # Resource Alerts
  - name: resources
    interval: 30s
    rules:
      - alert: HighMemoryUsage
        expr: |
          process_resident_memory_bytes{job=~".*metivta.*"}
          /
          (1024 * 1024 * 1024)
          > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.job }}"
          description: "Memory usage is {{ $value | humanize1024 }}B on {{ $labels.job }}."

      - alert: HighCPUUsage
        expr: |
          rate(process_cpu_seconds_total{job=~".*metivta.*"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.job }}"
          description: "CPU usage is {{ $value | humanizePercentage }} on {{ $labels.job }}."

  # Database Alerts
  - name: database
    interval: 30s
    rules:
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          metivta_db_pool_available_connections
          /
          metivta_db_pool_max_connections
          < 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Only {{ $value | humanizePercentage }} connections available."

      - alert: SlowDatabaseQueries
        expr: |
          histogram_quantile(0.95, sum(rate(metivta_db_query_duration_seconds_bucket[5m])) by (le))
          > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries"
          description: "P95 query duration is {{ $value | humanizeDuration }}."

  # Redis Alerts
  - name: redis
    interval: 30s
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis cache is not responding."

      - alert: RedisHighMemory
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}."
