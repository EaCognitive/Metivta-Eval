# Alertmanager Configuration for MetivitaEval
# Handles alert routing and notifications

global:
  # Default SMTP configuration
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@metivta.ai'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'

  # Default Slack API URL
  slack_api_url: '${SLACK_WEBHOOK_URL}'

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Routing tree
route:
  # Default receiver
  receiver: 'default-receiver'

  # Group alerts by these labels
  group_by: ['alertname', 'service', 'severity']

  # Wait before sending first alert
  group_wait: 30s

  # Wait before sending new alerts in existing group
  group_interval: 5m

  # Wait before re-sending alert
  repeat_interval: 4h

  # Child routes
  routes:
    # Critical alerts - immediate notification
    - receiver: 'critical-alerts'
      match:
        severity: critical
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts - batched
    - receiver: 'warning-alerts'
      match:
        severity: warning
      group_wait: 5m
      repeat_interval: 6h

    # Evaluation alerts
    - receiver: 'evaluation-alerts'
      match:
        alertname: EvaluationFailed
      group_wait: 1m

# Receivers
receivers:
  # Default receiver
  - name: 'default-receiver'
    email_configs:
      - to: 'team@metivta.ai'
        send_resolved: true

  # Critical alerts - Slack + Email
  - name: 'critical-alerts'
    slack_configs:
      - channel: '#metivta-alerts'
        send_resolved: true
        title: '{{ template "slack.critical.title" . }}'
        text: '{{ template "slack.critical.text" . }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
    email_configs:
      - to: 'oncall@metivta.ai'
        send_resolved: true
        html: '{{ template "email.critical.html" . }}'

  # Warning alerts - Slack only
  - name: 'warning-alerts'
    slack_configs:
      - channel: '#metivta-alerts'
        send_resolved: true
        title: '{{ template "slack.warning.title" . }}'
        text: '{{ template "slack.warning.text" . }}'
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'

  # Evaluation alerts
  - name: 'evaluation-alerts'
    slack_configs:
      - channel: '#metivta-evaluations'
        send_resolved: true
        title: 'Evaluation Alert'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

# Inhibition rules - prevent duplicate alerts
inhibit_rules:
  # If service is down, don't alert about its metrics
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['service']

  # Critical inhibits warning for same alert
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
