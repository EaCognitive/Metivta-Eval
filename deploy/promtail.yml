# Promtail Configuration for MetivitaEval
# Collects logs from all services and sends to Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Gateway logs
  - job_name: gateway
    static_configs:
      - targets:
          - localhost
        labels:
          job: gateway
          service: metivta-gateway
          __path__: /var/log/gateway/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            timestamp: time
            request_id: request_id
            evaluation_id: evaluation_id
            user_id: user_id
      - labels:
          level:
          request_id:
      - timestamp:
          source: timestamp
          format: RFC3339

  # FastAPI logs
  - job_name: fastapi
    static_configs:
      - targets:
          - localhost
        labels:
          job: fastapi
          service: metivta-fastapi
          __path__: /var/log/fastapi/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
            request_id: request_id
      - labels:
          level:
          request_id:

  # Flask logs
  - job_name: flask
    static_configs:
      - targets:
          - localhost
        labels:
          job: flask
          service: metivta-flask
          __path__: /var/log/flask/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
      - labels:
          level:

  # Worker logs
  - job_name: worker
    static_configs:
      - targets:
          - localhost
        labels:
          job: worker
          service: metivta-worker
          __path__: /var/log/worker/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            task_id: task_id
            evaluation_id: evaluation_id
      - labels:
          level:
          task_id:
